<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body>
<h2>Click each button to download the icon, then save to /public/</h2>
<canvas id="c192" width="192" height="192"></canvas>
<button onclick="download(192)">Download 192x192</button>
<br><br>
<canvas id="c512" width="512" height="512"></canvas>
<button onclick="download(512)">Download 512x512</button>

<script>
function draw(size) {
  const c = document.getElementById('c' + size);
  const ctx = c.getContext('2d');
  
  const gradient = ctx.createLinearGradient(0, 0, size, size);
  gradient.addColorStop(0, '#f59e0b');
  gradient.addColorStop(1, '#d97706');
  
  const r = size * 0.15;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();
  
  ctx.fillStyle = 'white';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `800 ${size * 0.32}px Arial`;
  ctx.fillText('SC', size/2, size/2 - size*0.08);
  ctx.font = `${size * 0.15}px Arial`;
  ctx.fillText('⚡', size/2, size/2 + size*0.18);
}

function download(size) {
  const c = document.getElementById('c' + size);
  const a = document.createElement('a');
  a.download = `pwa-${size}x${size}.png`;
  a.href = c.toDataURL('image/png');
  a.click();
}

draw(192);
draw(512);
</script>
</body>
</html>
